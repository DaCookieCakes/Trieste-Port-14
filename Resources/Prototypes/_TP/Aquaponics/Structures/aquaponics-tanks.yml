- type: entity
  parent: [ BaseStructure, BaseMachinePowered ]
  id: TP14AquaponicsTankBase
  abstract: true
  components:
  - type: AmbientSound
    volume: -9
    range: 5
    sound:
      path: /Audio/Ambience/Objects/flowing_water_open.ogg
  - type: Appearance
  - type: AquaponicsTank
  - type: ItemSlots
    slots:
      beaker:
        whitelist:
          components:
          - FitsInDispenser
  - type: Machine
    board: TP14AquaponicsMachineCircuitboard
  - type: RefillableSolution
    solution: insertion
  - type: SolutionContainerManager
    solutions:
      insertion:
        maxVol: 100
      waste:
        maxVol: 100
        canReact: false
      nutrients:
        maxVol: 100
        canReact: false

- type: entity
