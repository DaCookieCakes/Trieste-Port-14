# This is the Storm Array, a device that "siphons lighting" offscreen.
# It constantly heats up the surrounding room and needs to have its temperature carefully monitored to prevent a meltdown.
# It also gives occasional warnings and spawning sparks while taking damage, eventually exploding.

# STORM ARRAY #
- type: entity
  parent: BaseMachine
  id: TP14StormArray
  name: storm array
  description: The core of a massive array of lightning rods, siphoning searing energy from the eternal storm above. Must be kept cool.
  suffix: Trieste
  placement:
    mode: AlignTileAny
  components:
  - type: GuideHelp
    guides:
    - StormArray
    - Power
  - type: Appearance
  - type: Sprite
    sprite: _TP/Structures/Power/storm-array.rsi
    layers:
    - state: storm_array_idle
      map: [ "enum.StormArrayVisuals.Idle" ]
      visible: true
    - state: storm_array_active
      map: [ "enum.StormArrayVisuals.Active" ]
      visible: false
    drawdepth: Mobs
    offset: 0, 1
    snapCardinals: true
  - type: Physics
    bodyType: Static
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-1.25, -1, 1.25, 0.75"
        density: 50
        mask:
        - LargeMobMask
        layer:
        - WallLayer
  - type: AmbientSound
    enabled: true
    volume: -5
    range: 10
    sound:
      path: /Audio/Ambience/Objects/buzzing.ogg
  - type: Anchorable
    flags: None
  - type: StormArray

- type: entity
  id: TP14StormArrayCirculatorArrow
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    sprite: Markers/teg_arrow.rsi
    layers:
      - state: arrow
        offset: -2.20, 0
        rotation: 90
        color: "#FFFFFFBB"
      - state: arrow
        offset: 2, 0
        rotation: 90
        color: "#FFAAAABB"
  - type: TimedDespawn
    lifetime: 2
  - type: Tag
    tags:
      - HideContextMenu

- type: entity
  id: EntStormMast
  parent: BaseStructure
  name: storm mast
  description: An essential part of Trieste Port's unique power system, it re-directs lightning to strike the main array.
  components:
  - type: GuideHelp
    guides:
    - StormArray
  - type: Appearance
  - type: Sprite
    sprite: _TP/Structures/Power/weather-kite.rsi
    layers:
    - state: mast_idle
      map: ["enum.StormMastVisuals.Idle"]
      visible: true
    - state: mast_active
      map: ["enum.StormMastVisuals.Active"]
      visible: false
    drawdepth: Mobs
    offset: 0, 1
    snapCardinals: true
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-1.25, -1, 1.25, 0.75"
        density: 50
        mask:
        - LargeMobMask
        layer:
        - WallLayer
  - type: Anchorable
    flags: None
  - type: StormMast
