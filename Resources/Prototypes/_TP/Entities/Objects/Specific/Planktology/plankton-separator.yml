- type: entity
  parent: [StorageTank, StructureWheeled]
  id: TP14PlanktonSeparatorEmpty
  name: genetic isolator
  description: A liquid tank with an advanced filter, capable to divvying up plankton species.
  suffix: Trieste, Science
  components:
  - type: PlanktonSeparator
  - type: Plankton
    temperatureToleranceLow: 0
    temperatureToleranceHigh: 40
  - type: ItemSlots
    slots:
      plankton_container_slot:
        name: sample container
        whitelist:
          components:
          - Plankton
        ejectOnInteract: true
  - type: StaticPrice
    price: 1000
  - type: Sprite
    sprite: Structures/Storage/tanks.rsi
    layers:
      - state: watertank-2
      - state: watertank-2-1
        map: ["enum.SolutionContainerLayers.Fill"]
        visible: false
  - type: Appearance
  - type: SolutionContainerVisuals
    maxFillLevels: 5
    fillBaseName: watertank-2-
  - type: ExaminableSolution
    solution: tank
  - type: SolutionContainerManager
    solutions:
      tank:
        maxVol: 100
  - type: RefillableSolution
    solution: tank
  - type: DrainableSolution
    solution: tank
    exactVolume: true
  - type: DrawableSolution
    solution: tank


- type: entity
  parent: TP14PlanktonSeparatorEmpty
  id: TP14PlanktonSeparatorFull
  suffix: Trieste, Science, Full
  components:
  - type: SolutionContainerManager
    solutions:
      tank:
        maxVol: 1000
        reagents:
        - ReagentId: SeaWater
          Quantity: 1000
