- type: entity
  name: raw fish fillet
  parent: FoodMeatBase
  id: TP14FoodMeatFish
  suffix: Trieste, Food
  description: A delicious, raw fillet.
  components:
  - type: FlavorProfile
    flavors:
    - fishy
  - type: Tag
    tags:
    - Raw
    - Meat
  - type: Sprite
    state: fish
  - type: Extractable
    juiceSolution:
      reagents:
      - ReagentId: FishOil
        Quantity: 5

- type: entity
  parent: FoodMeatBase
  id: TP14FoodMeatFishFingers
  suffix: Trieste, Food
  name: fish fingers
  description: Fried strips of fish. Doctors love it with custard.
  components:
  - type: FlavorProfile
    flavors:
    - fishy
  - type: Tag
    tags:
    - Cooked
    - Meat
  - type: Sprite
    sprite: _TP/Objects/Consumable/fried-food.rsi
    state: Fish_Sticks
  - type: SolutionContainerManager
    solutions:
      food:
        reagents:
        - ReagentId: Nutriment
          Quantity: 5
        - ReagentId: Protein
          Quantity: 5

- type: entity
  parent: FoodMeatBase
  id: TP14FoodMeatSausage
  name: raw sausage
  description: Let's sausage!
  components:
  - type: Tag
    tags:
    - Raw
    - Meat
  - type: Sprite
    state: sausage
  - type: SolutionContainerManager
    solutions:
      food:
        reagents:
        - ReagentId: UncookedAnimalProteins
          Quantity: 3
        - ReagentId: Fat
          Quantity: 2
  - type: Construction
    graph: Cutlet
    node: sausage
  - type: Item
    size: Small
    shape:
    - 0,0,1,0
    inhandVisuals:
      left:
      - state: sausage-inhand-left
      right:
      - state: sausage-inhand-right

# Chicken (RAW)
- type: entity
  parent: FoodMeatChicken
  id: EntFoodChickenRaw
  name: raw chicken
  description: An entire raw chicken. Remember to wash your hands!
  components:
  - type: Sprite
    sprite: _TP/Objects/Consumable/Food/meat.rsi
    state: chicken-whole-raw
  - type: SolutionContainerManager
    solutions:
      food:
        reagents:
        - ReagentId: UncookedAnimalProteins
          Quantity: 54
        - ReagentId: Fat
          Quantity: 54
  - type: SliceableFood
    slice:
    - proto: FoodMeatChicken
      count: 2
    - proto: EntFoodChickenLegRaw
      count: 2
    - proto: EntFoodChickenWingRaw
      count: 2
  - type: Item
    size: Normal

- type: entity
  parent: FoodMeatChicken
  id: EntFoodChickenLegRaw
  name: raw chicken leg
  components:
  - type: Sprite
    sprite: _TP/Objects/Consumable/Food/meat.rsi
    state: chicken-leg-raw

- type: entity
  parent: FoodMeatChicken
  id: EntFoodChickenWingRaw
  name: raw chicken wing
  components:
  - type: Sprite
    sprite: _TP/Objects/Consumable/Food/meat.rsi
    state: chicken-wing-raw
